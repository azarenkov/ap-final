global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: train-service
    static_configs:
      - targets: ["train-service:9091"]
        labels: { service: train-service }

  - job_name: user-service
    static_configs:
      - targets: ["user-service:9092"]
        labels: { service: user-service }

  - job_name: booking-service
    static_configs:
      - targets: ["booking-service:9093"]
        labels: { service: booking-service }

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:9094"]
        labels: { service: notification-service }

  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:9095"]
        labels: { service: api-gateway }
