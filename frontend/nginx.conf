server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history-mode routing — every unknown path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively.
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
